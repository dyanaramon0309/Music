<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}
  .lyrics{

width:300px;
height:620px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(15px);

padding:20px;

border-radius:25px;

box-shadow:0 10px 40px rgba(0,0,0,.25);

color:white;

flex-shrink:0;

}

.lyrics h3{
margin-bottom:15px;
text-align:center;
}

.lyrics-box{
height:400px;
overflow-y:auto;
padding-right:10px;
line-height:1.9;
font-size:16px;
white-space: pre-line;  
}

.lyrics-box::-webkit-scrollbar{
width:8px;
}

.lyrics-box::-webkit-scrollbar-thumb{
background:white;
border-radius:10px;
}

body{

display:flex;
justify-content:center;
align-items:center;
gap:30px;
height:100vh;
overflow:hidden;

background:linear-gradient(-45deg,#ff9ed2,#ff7eb9,#ff5ca8,#ffb6e6);

background-size:400% 400%;
animation:fondo 10s ease infinite;

transition:1s;

}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

#notas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.nota{
position:absolute;
bottom:-50px;
color:white;
opacity:.4;
animation:subir linear forwards;
}

@keyframes subir{
0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}
20%{
opacity:.5;
}
100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

.player{
width:320px;
flex-shrink:0;
padding:25px;
background:rgba(255,255,255,.2);
backdrop-filter:blur(15px);
border-radius:25px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,.25);
z-index:10;
}

img{

width:250px;
height:250px;
border-radius:50%;
object-fit:cover;

transition:.5s;

box-shadow:0 0 25px rgba(255,255,255,.4);

}

h2{
margin:20px 0;
color:white;
}

button{
width:65px;
height:65px;
border:none;
border-radius:50%;
font-size:24px;
margin:10px;
cursor:pointer;
background:white;
color:#ff4fa3;
transition:.3s;
 
}
.buttons{

display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin-top:15px;

}
button:hover{
transform:scale(1.1);
}

input{
width:100%;
margin-top:15px;
accent-color:white;
}
  .app{

display:flex;
justify-content:center;
align-items:flex-start;
gap:20px;
width:100%;
padding:20px;
flex-wrap:wrap;

}

.playlist{

width:180px;
background:rgba(255,255,255,.20);
backdrop-filter:blur(15px);
padding:20px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.25);

}

.playlist h2{

color:white;
margin-bottom:20px;
text-align:center;

}

.song{

padding:15px;
margin-bottom:10px;
background:rgba(255,255,255,.15);
border-radius:15px;
cursor:pointer;
color:white;
transition:.3s;

}

.song:hover{

background:white;
color:#ff4fa3;
transform:translateX(8px);

}

.active{

background:white;
color:#ff4fa3;

}
  .girando{

animation:girar 8s linear infinite;

}

@keyframes girar{

from{

transform:rotate(0deg);

}

to{

transform:rotate(360deg);

}

}
  .tiempo{

display:flex;
justify-content:space-between;
margin-top:8px;
color:white;
font-size:14px;

}
</style>

</head>
<body>

<div id="notas"></div>
  <div class="app">

  <div class="playlist">

<h2>𝓜𝓲 𝓹𝓵𝓪𝔂𝓵𝓲𝓼𝓽</h2>

<div class="song active" onclick="cargarCancion(0)">

</div>

<div class="song"onclick="cargarCancion(1)">

</div>

</div>
  
<div class="player">

<img id="cover" src="Manchild—Sabrina Carpenter.webp">

<h2 id="titulo">
Manchild
</h2>

<p id="artista">
Sabrina Carpenter
</p>

<audio id="audio" src="Sabrina Carpenter - Manchild (Official Video).mp3"></audio>

<div class="buttons">

<button onclick="anterior()">
⏮️
</button>

<button onclick="playPause()" id="play">
▶
</button>

<button onclick="siguiente()">
⏭️
</button>

</div>

<input type="range" id="barra" value="0">
<div class="tiempo">

<span id="actual">0:00</span>

<span id="duracion">0:00</span>
  
</div>
<div class="lyrics">

<h3>♪ Letra</h3>
<div class="lyrics-box" id="lyrics">
</div>
<script>

letra:`

let indiceActual=0;
const audio=document.getElementById("audio");
  const cover=document.getElementById("cover");
const titulo=document.getElementById("titulo");
const artista=document.getElementById("artista");
const lyrics=document.getElementById("lyrics");
  
const play=document.getElementById("play");
const barra=document.getElementById("barra");
const actual=document.getElementById("actual");
const duracion=document.getElementById("duracion");
 
  function formatoTiempo(segundos){

let minutos=Math.floor(segundos/60);

let secs=Math.floor(segundos%60);

if(secs<10){

secs="0"+secs;

}

return minutos+":"+secs;

}
  function cargarCancion(indice){

indiceActual=indice;

cover.src=canciones[indice].imagen;

titulo.innerHTML=canciones[indice].titulo;

artista.innerHTML=canciones[indice].artista;

audio.src=canciones[indice].audio;

lyrics.innerHTML=canciones[indice].letra;
    
if(canciones[indice].tema=="rosa"){

document.body.style.background=
"linear-gradient(-45deg,#ff9ed2,#ff7eb9,#ff5ca8,#ffb6e6)";
  
audio.pause();

play.innerHTML="▶";

cover.classList.remove("girando");
}

if(canciones[indice].tema=="rojo"){

document.body.style.background=
"linear-gradient(-45deg,#5a0000,#8b0000,#b30000,#ff2d55)";

}
}
  function siguiente(){

indiceActual++;

if(indiceActual>=canciones.length){

indiceActual=0;

}

cargarCancion(indiceActual);

}

function anterior(){

indiceActual--;

if(indiceActual<0){

indiceActual=canciones.length-1;

}

cargarCancion(indiceActual);

}
function playPause(){

if(audio.paused){

audio.play();
  cover.classList.add("girando");
play.innerHTML="⏸";

}else{

audio.pause();
  cover.classList.remove("girando");
play.innerHTML="▶";

}

}

audio.addEventListener("loadedmetadata",()=>{

barra.max=audio.duration;

duracion.innerHTML=formatoTiempo(audio.duration);

});

audio.addEventListener("timeupdate",()=>{

barra.value=audio.currentTime;

actual.innerHTML=formatoTiempo(audio.currentTime);

});

barra.oninput=()=>{

audio.currentTime=barra.value;

};

function crearNota(){

const nota=document.createElement("div");

nota.className="nota";

let simbolos=[];

if(canciones[indiceActual].tema=="rosa"){

simbolos=["♪","♫","♬","♩"];

}

if(canciones[indiceActual].tema=="rojo"){

simbolos=["🍒","🔥","🍒","🔥"];

}

nota.innerHTML=simbolos[Math.floor(Math.random()*simbolos.length)];

nota.style.left=Math.random()*100+"%";

if(canciones[indiceActual].tema=="rosa"){

nota.style.fontSize=(20+Math.random()*40)+"px";

}

if(canciones[indiceActual].tema=="rojo"){

nota.style.fontSize=(30+Math.random()*30)+"px";

}

nota.style.animationDuration=(5+Math.random()*5)+"s";

  if(canciones[indiceActual].tema=="rojo"){

nota.style.opacity="0.8";

}
document.getElementById("notas").appendChild(nota);

setTimeout(()=>{

nota.remove();

},10000);

}
cargarCancion(0);
  audio.addEventListener("ended",()=>{

siguiente();

});
setInterval(crearNota,250);

</script>
